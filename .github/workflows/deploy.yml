name: Deploy to 3 VMs

on:
  push:
    branches: [ "master" ] # Make sure this matches your branch name (main or master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Pull Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          # These must match your GitHub Secret names exactly
          host: ${{ secrets.GCE_IPS }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            # 1. Go to your code folder on the VM
            # REPLACE 'your-repo-folder' with your actual folder name
            cd /home/${{ secrets.GCE_USERNAME }}/gitdev
            
            # 2. Pull the latest code
            git pull origin main
            
            # 3. Optional: Restart your python script
            # Example: pkill -f main.py || true && nohup python3 main.py &

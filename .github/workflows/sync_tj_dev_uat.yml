name: Sync TJ Dev to UAT

# This will automatically push it
# on:
#   push:
#     branches:
#       - master
#     paths:
#       - 'dev/**'

# On Demand push
on:
  workflow_dispatch: # This enables the manual "Run workflow" button
  
jobs:
  copy-dev-to-uat:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy and Force Sync
        run: |
          mkdir -p uat
          # Sync dev contents to uat (this replaces everything in uat with dev)
          rsync -av --delete dev/ uat/
          touch uat/.gitkeep
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the uat folder in case it's being ignored
          git add -A uat/
          
          # Only push if there are changes
          if [ -n "$(git status --porcelain uat/)" ]; then
            git commit -m "Sync: dev/hi.txt updated to uat/hi.txt"
            git push origin master
          else
            echo "No changes to sync."
          fi

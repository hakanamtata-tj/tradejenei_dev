name: Sync Folder Action

on:
  push:
    branches:
      - master
    paths:
      - 'dev/**'

jobs:
  copy-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Folders
        run: |
          mkdir -p uat
          cp -rf dev/* uat/
          touch uat/.gitkeep

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add uat/
          if [ -n "$(git status --porcelain uat/)" ]; then
            git commit -m "Automated sync from dev to uat"
            git push
          else
            echo "Nothing to change"
          fi
